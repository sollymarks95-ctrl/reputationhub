name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel Production Deployment
        run: |
          SHA="${{ github.sha }}"
          MSG="${{ github.event.head_commit.message }}"

          RESPONSE=$(curl -s -X POST \
            "https://api.vercel.com/v13/deployments?teamId=team_i0UdvDcC0rdntVBoxbP7i46X&forceNew=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"reputationhub\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": \"1251027294\",
                \"ref\": \"main\",
                \"sha\": \"${SHA}\"
              }
            }")

          echo "Response: $RESPONSE"
          
          # Extract URL and state
          URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url','no-url'))" 2>/dev/null || echo "parse-error")
          STATE=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',d.get('readyState','unknown')))" 2>/dev/null || echo "unknown")
          
          echo "🚀 Deployment triggered!"
          echo "URL: $URL"
          echo "State: $STATE"
          
          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "❌ Vercel API error in response"
            exit 1
          fi
          
          echo "✅ Deployment queued successfully"
