name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy latest commit to Vercel
        run: |
          SHA="${{ github.sha }}"
          echo "Deploying SHA: $SHA"
          
          RESPONSE=$(curl -s \
            -X POST "https://api.vercel.com/v13/deployments?teamId=team_i0UdvDcC0rdntVBoxbP7i46X" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"reputationhub\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": \"1251027294\",
                \"ref\": \"main\",
                \"sha\": \"${SHA}\"
              }
            }")
          
          echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print('ID:', d.get('id', 'N/A'))
print('URL:', d.get('url', 'N/A'))
print('State:', d.get('status', d.get('readyState', 'N/A')))
if 'error' in d:
    print('ERROR:', d['error'])
" 2>/dev/null || echo "$RESPONSE"
