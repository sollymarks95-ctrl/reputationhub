name: Deploy to Vercel
on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: team_i0UdvDcC0rdntVBoxbP7i46X
  VERCEL_PROJECT_ID: prj_Kziy22RlbG1OFUJkWAA8SC3Gn9U5

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_Kziy22RlbG1OFUJkWAA8SC3Gn9U5","orgId":"team_i0UdvDcC0rdntVBoxbP7i46X"}' > .vercel/project.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy source to Vercel
        run: |
          vercel \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --prod \
            --yes \
            --scope=team_i0UdvDcC0rdntVBoxbP7i46X
