name: Notify Deploy
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Log push
        run: |
          echo "✅ Push received: ${{ github.sha }}"
          echo "Vercel GitHub integration handles the actual deploy"
          echo "If Vercel isn't deploying, check: vercel.com → reputationhub → Settings → Git"
