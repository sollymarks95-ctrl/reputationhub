name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Vercel Action
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: team_i0UdvDcC0rdntVBoxbP7i46X
          vercel-project-id: prj_Kziy22RlbG1OFUJkWAA8SC3Gn9U5
          vercel-args: '--prod'
          working-directory: ./
