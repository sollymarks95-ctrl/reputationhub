name: Deploy to Vercel
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel Deployment
        run: |
          RESPONSE=$(curl -s \
            -X POST "https://api.vercel.com/v13/deployments?teamId=team_i0UdvDcC0rdntVBoxbP7i46X" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "reputationhub",
              "target": "production",
              "gitSource": {
                "type": "github",
                "repoId": "1251027294",
                "ref": "main"
              }
            }')
          echo "=== VERCEL RESPONSE ==="
          echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE"
          echo "======================="
          
          # Just report — don't fail on error response
          URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url', d.get('error', {}).get('message','check vercel')))" 2>/dev/null || echo "check vercel dashboard")
          echo "Result: $URL"
