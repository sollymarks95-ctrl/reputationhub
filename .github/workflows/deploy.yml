name: Deploy to Vercel
on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: team_i0UdvDcC0rdntVBoxbP7i46X
  VERCEL_PROJECT_ID: prj_Kziy22RlbG1OFUJkWAA8SC3Gn9U5

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          echo '{"projectId":"prj_Kziy22RlbG1OFUJkWAA8SC3Gn9U5","orgId":"team_i0UdvDcC0rdntVBoxbP7i46X"}' > .vercel/project.json

      - name: Install Vercel CLI v32 (stable)
        run: npm install -g vercel@32

      - name: Show version
        run: vercel --version

      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
