name: Setup Vercel Deploy Hook
on:
  workflow_dispatch:

jobs:
  create-hook:
    runs-on: ubuntu-latest
    steps:
      - name: Create deploy hook and save as secret
        run: |
          # Create the deploy hook
          RESPONSE=$(curl -s -X POST \
            "https://api.vercel.com/v1/projects/prj_Kziy22RlbG1OFUJkWAA8SC3Gn9U5/deploy-hooks?teamId=team_i0UdvDcC0rdntVBoxbP7i46X" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"auto-deploy","ref":"main"}')
          
          echo "Response: $RESPONSE"
          
          # Extract hook details
          HOOK_URL=$(echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
hook = d.get('hook', {})
hook_id = hook.get('id', '')
secret = hook.get('secretToken', '')
if hook_id and secret:
    print(f'https://api.vercel.com/v1/integrations/deploy/{hook_id}/{secret}')
else:
    print('ERROR: ' + str(d))
" 2>/dev/null)
          
          echo "Hook URL: $HOOK_URL"
          
          if [[ "$HOOK_URL" == https* ]]; then
            # Save as GitHub secret using gh CLI
            echo "$HOOK_URL" | gh secret set VERCEL_DEPLOY_HOOK_URL
            echo "✅ Deploy hook saved as VERCEL_DEPLOY_HOOK_URL secret"
            echo ""
            echo "Test it with: curl -X POST '$HOOK_URL'"
          else
            echo "❌ Failed to create hook: $HOOK_URL"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
