name: Setup Vercel Deploy Hook
on:
  workflow_dispatch:

jobs:
  create-hook:
    runs-on: ubuntu-latest
    steps:
      - name: Create Vercel Deploy Hook
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.vercel.com/v1/projects/prj_Kziy22RlbG1OFUJkWAA8SC3Gn9U5/deploy-hooks?teamId=team_i0UdvDcC0rdntVBoxbP7i46X" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"github-auto-deploy","ref":"main"}')
          echo "Response: $RESPONSE"
          HOOK_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); h=d.get('hook',{}); print('https://api.vercel.com/v1/integrations/deploy/' + h.get('id','') + '/' + h.get('secretToken','') if h.get('id') else d)" 2>/dev/null)
          echo "Hook URL: $HOOK_URL"
