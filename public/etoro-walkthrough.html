<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eToro × RepHuby — Interactive Walkthrough</title>
<style>
  :root{
    --bg:#070b16; --panel:#0f1623; --panel2:#131c2e; --border:rgba(255,255,255,0.08);
    --gold:#c9a13a; --gold2:#e8c66b; --blue:#0EA5E9; --green:#10b981; --red:#f87171;
    --txt:#e2e8f0; --mut:#64748b;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:
      radial-gradient(1100px 620px at 14% -8%, rgba(201,161,58,0.10), transparent 55%),
      radial-gradient(900px 700px at 100% 0%, rgba(14,165,233,0.07), transparent 50%),
      var(--bg);
    background-attachment:fixed;
  }
  ::selection{background:rgba(201,161,58,0.35);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:8px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2);}
  .wrap{display:flex;min-height:100vh;}

  /* SIDEBAR */
  .side{
    width:308px;flex-shrink:0;
    background:linear-gradient(180deg, rgba(19,28,46,0.85), rgba(15,22,35,0.85));
    backdrop-filter:blur(6px);
    border-right:1px solid var(--border);
    padding:26px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{padding:2px 8px 20px;border-bottom:1px solid var(--border);margin-bottom:18px;}
  .brand .mark{
    width:34px;height:34px;border-radius:9px;flex-shrink:0;
    background:linear-gradient(135deg,var(--gold),#8a6a1e);
    display:inline-flex;align-items:center;justify-content:center;
    font-family:Georgia,serif;font-weight:700;font-size:16px;color:#0a0f1e;
    box-shadow:0 4px 14px rgba(201,161,58,0.35);
    margin-right:10px;vertical-align:middle;
  }
  .brand .txt{display:inline-block;vertical-align:middle;}
  .brand .name{font-family:Georgia,serif;font-size:18px;font-weight:700;color:#fff;line-height:1.2;}
  .brand .name span{color:var(--gold);}
  .brand .sub{font-size:9.5px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;font-weight:600;}

  .progress-wrap{padding:0 8px 20px;}
  .progress-bar{height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,0.4);}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:4px;transition:width .45s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px rgba(201,161,58,0.5);}
  .progress-txt{font-size:10px;color:var(--mut);margin-top:7px;letter-spacing:.5px;font-weight:600;}

  .step{
    display:flex;gap:11px;align-items:center;padding:10px 10px;border-radius:10px;
    cursor:pointer;margin-bottom:3px;transition:all .18s ease;
    border:1px solid transparent;
  }
  .step:hover{background:rgba(255,255,255,0.045);transform:translateX(2px);}
  .step.active{
    background:linear-gradient(90deg, rgba(201,161,58,0.16), rgba(201,161,58,0.04));
    border-color:rgba(201,161,58,0.25);
  }
  .step .num{
    width:30px;height:30px;border-radius:9px;flex-shrink:0;
    background:var(--panel2);border:1.5px solid rgba(255,255,255,0.08);
    display:flex;align-items:center;justify-content:center;font-size:14px;
    transition:all .18s ease;
  }
  .step.active .num{
    border-color:var(--gold);background:rgba(201,161,58,0.18);
    box-shadow:0 0 12px rgba(201,161,58,0.3);
  }
  .step.done .num{border-color:rgba(16,185,129,0.5);background:rgba(16,185,129,0.12);color:var(--green);font-size:13px;font-weight:700;}
  .step .lbl{font-size:13px;color:#cbd5e1;line-height:1.3;font-weight:500;}
  .step.active .lbl{font-weight:700;color:#fff;}
  .step .sub{font-size:10px;color:var(--mut);margin-top:1px;}

  /* MAIN */
  .main{flex:1;padding:40px 52px 60px;max-width:1000px;}
  .fade-enter{animation:fadeSlide .38s cubic-bezier(.16,1,.3,1);}
  @keyframes fadeSlide{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }
  .kick{
    color:var(--gold);letter-spacing:3px;text-transform:uppercase;font-size:10.5px;font-weight:800;
    display:inline-flex;align-items:center;gap:8px;
  }
  .kick .kicon{font-size:14px;}
  h1{
    font-family:Georgia,serif;font-size:32px;line-height:1.15;margin:10px 0 8px;color:#fff;
    letter-spacing:-.3px;
  }
  .lead{color:#9aa7bb;font-size:14.5px;line-height:1.65;max-width:660px;margin-bottom:26px;}
  .panel{
    background:linear-gradient(160deg, rgba(19,28,46,0.9), rgba(15,22,35,0.9));
    border:1px solid var(--border);border-radius:14px;padding:26px;margin-bottom:20px;
    box-shadow:0 10px 30px -12px rgba(0,0,0,0.5);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .panel:hover{box-shadow:0 14px 38px -12px rgba(0,0,0,0.6);}
  .panel h3{margin:0 0 16px;font-size:15px;color:#fff;font-family:Georgia,serif;font-weight:700;}

  /* mock widgets reused across steps */
  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:6px;}
  .kpi{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:14px;transition:transform .15s ease;}
  .kpi:hover{transform:translateY(-2px);border-color:rgba(201,161,58,0.3);}
  .kpi .n{font-family:Georgia,serif;font-size:25px;font-weight:700;color:#fff;}
  .kpi .l{font-size:9.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin-top:4px;font-weight:600;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:9px 2px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12.5px;transition:background .15s ease;border-radius:6px;}
  .row:hover{background:rgba(255,255,255,0.025);}
  .row:last-child{border-bottom:none;}
  .tag{display:inline-block;font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:5px;background:rgba(14,165,233,0.15);color:var(--blue);}
  .pos{color:var(--green);font-weight:700;}
  .neg{color:var(--red);font-weight:700;}
  .cite{display:inline-block;font-size:9px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:6px;padding:3px 8px;margin:4px 5px 0 0;color:#cbd5e1;}
  .ans{background:rgba(16,185,129,0.08);border-left:3px solid var(--green);border-radius:0 8px 8px 0;padding:12px 14px;font-size:12.5px;color:#bbf7d0;margin:9px 0;line-height:1.55;}

  /* buttons */
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;
    padding:12px 20px;border-radius:10px;text-decoration:none;cursor:pointer;border:none;
    transition:all .18s ease;
  }
  .btn-live{
    background:linear-gradient(135deg,var(--gold2),var(--gold));color:#0a0f1e;
    box-shadow:0 6px 18px -4px rgba(201,161,58,0.45);
  }
  .btn-live:hover{transform:translateY(-1px);box-shadow:0 8px 22px -4px rgba(201,161,58,0.6);}
  .btn-ghost{background:rgba(255,255,255,0.03);border:1px solid var(--border);color:#cbd5e1;}
  .btn-ghost:hover{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.06);}
  .btn-ghost:disabled{opacity:.3;cursor:default;}
  .nav-btns{display:flex;justify-content:space-between;margin-top:32px;padding-top:22px;border-top:1px solid var(--border);}
  .checklist{font-size:12.5px;color:#9aa7bb;margin-top:4px;}
  .checklist div{padding:5px 0;display:flex;gap:8px;align-items:flex-start;}
  .checklist div .ck{color:var(--green);font-weight:700;flex-shrink:0;}
  .badge-live{
    display:inline-block;background:rgba(16,185,129,0.15);color:var(--green);font-size:9.5px;
    font-weight:700;padding:3px 10px;border-radius:20px;margin-left:8px;vertical-align:middle;
    box-shadow:0 0 0 1px rgba(16,185,129,0.2);
  }
  @media (max-width: 900px){
    .wrap{flex-direction:column;}
    .side{width:100%;height:auto;position:relative;}
    .main{padding:28px 22px 50px;}
  }
</style>
</head>

let idx = 0;
const doneSet = new Set();

function renderSidebar(){
  const el = document.getElementById('steps');
  el.innerHTML = STEPS.map((s,i)=>`
    <div class="step ${i===idx?'active':''} ${doneSet.has(i)?'done':''}" onclick="goTo(${i})">
      <div class="num">${doneSet.has(i) && i!==idx ? '✓' : s.icon}</div>
      <div><div class="lbl">${s.label}</div><div class="sub">${s.sub}</div></div>
    </div>`).join('');
  document.getElementById('pfill').style.width = Math.round(((idx+1)/STEPS.length)*100)+'%';
  document.getElementById('ptxt').textContent = `Step ${idx+1} of ${STEPS.length}`;
}

function renderMain(){
  const s = STEPS[idx];
  const el = document.getElementById('main');
  el.className = '';
  el.innerHTML = `
    <div class="fade-enter">
      <div class="kick"><span class="kicon">${s.icon}</span>${s.kick}</div>
      <h1>${s.title}</h1>
      <div class="lead">${s.lead}</div>
      ${s.panel}
      <div class="panel">
        <h3>What's actually been built here</h3>
        <div class="checklist">${s.checklist.map(c=>`<div><span class="ck">✓</span> ${c}</div>`).join('')}</div>
      </div>
      <div class="actions">
        <a class="btn btn-live" href="${s.live.url}" target="_blank" rel="noopener">🔴 ${s.live.label}</a>
      </div>
      <div class="nav-btns">
        <button class="btn btn-ghost" onclick="prevStep()" ${idx===0?'disabled':''}>← Previous</button>
        <button class="btn btn-live" onclick="nextStep()">${idx===STEPS.length-1?'Restart tour ↺':'Next step →'}</button>
      </div>
    </div>
  `;
}

function goTo(i){ doneSet.add(idx); idx=i; renderSidebar(); renderMain(); window.scrollTo(0,0); }
function nextStep(){ doneSet.add(idx); idx = idx===STEPS.length-1 ? 0 : idx+1; renderSidebar(); renderMain(); window.scrollTo(0,0); }
function prevStep(){ if(idx>0){ idx--; renderSidebar(); renderMain(); window.scrollTo(0,0); } }

renderSidebar(); renderMain();
</script>
</body>
</html>
